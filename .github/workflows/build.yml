name: Runner CI

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - releases/*
    paths-ignore:
    - '**.md'
  pull_request:
    branches:
    - '**'
    paths-ignore:
    - '**.md'

jobs:
  build:
    strategy:
      matrix:
        runtime: [ linux-s390x, linux-ppc64le, linux-x64, linux-arm64, linux-arm ]
        include:

        - runtime: linux-x64
          runs_on: amd64

        - runtime: linux-arm64
          runs_on: arm64

        - runtime: linux-arm
          runs_on: arm64
          patch_tag: arm

        - runtime: linux-ppc64le
          runs_on: ppc64le
          patch_tag: ppc64le

        - runtime: linux-s390x
          runs_on: s390x
          patch_tag: s390x

    runs-on: [ self-hosted, noble, "${{ matrix.runs_on }}" ]
    steps:
    - uses: actions/checkout@v4

    - name: Install DotNet SDK
      run: sudo apt-get update && sudo apt-get install -y dotnet-sdk-8.0

    - name: Apply patches
      if: matrix.runtime == 'linux-s390x' || matrix.runtime == 'linux-ppc64le' || matrix.runtime == 'linux-arm'
      run: |
        git apply patches/runner-main-sdk8-${{ matrix.patch_tag }}.patch

    - name: Update DotNet required version pin
      run: |
        sed -i "s/$( cat src/global.json | jq -r '.sdk.version' )/8.0/" src/global.json

    # Build runner layout
    - name: Build & Layout Release
      run: |
        ./dev.sh layout Release ${{ matrix.runtime }}
      working-directory: src

    # Run tests
    - name: L0
      run: |
        ./dev.sh test
      working-directory: src
      if: matrix.runtime == 'arm64' || matrix.runtime == 'amd64'

    # Create runner package tar.gz/zip
    - name: Package Release
      if: github.event_name != 'pull_request'
      run: |
        ./dev.sh package Release ${{ matrix.runtime }}
      working-directory: src

    - name: Test package
      if: github.event_name != 'pull_request' && matrix.runtime != 'linux-arm'
      run: |
        mkdir package_test
        tar -xvzf ../_package/*.tar.gz -C package_test
        ./package_test/config.sh --version
      working-directory: src

    # linux-arm produces armv7l (32-bit) binaries that cannot execute on the
    # arm64 build host, so smoke-test the package inside a 32-bit arm container.
    # This also exercises the host's AArch32 userspace, matching how armhf
    # runners are actually hosted in production.
    - name: Test package (arm32v7 container)
      if: github.event_name != 'pull_request' && matrix.runtime == 'linux-arm'
      run: |
        mkdir package_test
        tar -xzf ../_package/*.tar.gz -C package_test
        # Use sudo only if the runner user can't reach the Docker daemon directly.
        DOCKER=docker
        if ! docker info >/dev/null 2>&1; then DOCKER="sudo docker"; fi
        $DOCKER run --rm --platform linux/arm/v7 \
          -e RUNNER_ALLOW_RUNASROOT=1 \
          -v "$(pwd)/package_test:/runner" -w /runner \
          arm32v7/ubuntu:noble \
          bash -c 'set -e; apt-get update -qq; DEBIAN_FRONTEND=noninteractive apt-get install -y -qq libicu74 libatomic1 ca-certificates >/dev/null; ./config.sh --version'
      working-directory: src

    # Upload runner package tar.gz/zip as artifact
    - name: Publish Artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: runner-package-${{ matrix.runtime }}
        path: |
          _package

    - uses: mattermost/action-mattermost-notify@master
      if: ${{ failure() }}
      with:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
        TEXT: |
          ${{ github.repository }} build failed.
          [Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) was failed :red_circle:
          ${{ secrets.MM_PING_USERS }}
        MATTERMOST_USERNAME: ${{ github.triggering_actor }}
        MATTERMOST_ICON_URL: https://cdn-icons-png.flaticon.com/512/25/25231.png
